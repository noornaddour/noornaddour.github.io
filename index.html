<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Subscribe Test branch</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Optional styling (safe to remove) -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .container {
      max-width: 400px;
      margin: 60px auto;
      padding: 20px;
      background: white;
      border-radius: 6px;
    }
    header {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>This Marketing Site Is Sick!!</header>

    <form id="subscribeForm">
      <h2>Subscribe to our mailing list on test branch!</h2>

      <label for="inputEmail">Email address</label>
      <input
        type="email"
        id="inputEmail"
        placeholder="Email address"
        required
      />

      <button type="submit">Subscribe!</button>
    </form>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <!-- Firebase v10 + app wiring -->
  <script type="module">
    import { initializeApp } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    import { saveToFirebase } 
      from "./saveToFirebase.js";

    // 🔁 Replace with YOUR Firebase config
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyBNSXl3WT0Ms1Arm8G9PS29HDqfUPJL5Vc",
      authDomain: "proto-lite.firebaseapp.com",
      databaseURL: "https://proto-lite-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "proto-lite",
      storageBucket: "proto-lite.firebasestorage.app",
      messagingSenderId: "38747716907",
      appId: "1:38747716907:web:95fec900476369e42dd96e",
      measurementId: "G-7WTSPTD6PZ"
    };

    // Initialize Firebase
    initializeApp(firebaseConfig);

    const form = document.getElementById("subscribeForm");

    form.addEventListener("submit", (event) => {
      event.preventDefault(); // ✅ stop reload

      const email = document.getElementById("inputEmail").value;

      saveToFirebase(email)
        .then(() => {
          alert("Subscribed successfully!");
          form.reset();
        })
        .catch((error) => {
          console.error(error);
          alert("Failed to subscribe");
        });
    });
  </script>

</body>
</html>
