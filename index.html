<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <title>Thanks for all the fish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>


<!-- ================= HEADER ================= -->
<header class="cmp-header">
  <div class="container utils-padding-horizontal--base">
    <div class="cmp-header__logo">
      <img src="assets/images/dolphin.png" alt="Logo" />
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main id="main">

  <!-- ===== HERO SECTION ===== -->
  <section class="section utils-background-grey-100 utils-padding-vertical--large">
    <div class="container cmp-hero">
      <div>
        <h1 class="cmp-hero__title">Insight‑Driven Futures</h1>
        <p>Adapting the structural layout of kpmg.html with a single visual asset.</p>
      </div>
      <img src="assets/images/dolphin.png" alt="Hero Image" />
    </div>
  </section>

  <!-- ===== FEATURED INSIGHTS ===== -->
  <section class="section utils-padding-vertical--large">
    <div class="container columncontrol threeEven">

      <article class="cmp-teaser">
        <img src="assets/images/dolphin.png" alt="" />
        <div class="cmp-teaser__content">
          <h3 class="cmp-teaser__title">Insight One</h3>
          <p>Teaser content structure matching KPMG.</p>
        </div>
      </article>

      <article class="cmp-teaser">
        <img src="assets/images/dolphin.png" alt="" />
        <div class="cmp-teaser__content">
          <h3 class="cmp-teaser__title">Insight Two</h3>
          <p>Reusable single asset image.</p>
        </div>
      </article>

      <article class="cmp-teaser">
        <img src="assets/images/dolphin.png" alt="" />
        <div class="cmp-teaser__content">
          <h3 class="cmp-teaser__title">Insight Three</h3>
          <p>Grid system mirrors kpmg.html.</p>
        </div>
      </article>

    </div>
  </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="cmp-footer">
  <div class="container">
    <p>© 2026 Demo Site · Structure inspired by kpmg.html</p>
  </div>
</footer>

</body>
</html>
